<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OCR Titulares</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #c8f04a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #status {
      font-size: 11px;
      color: #555;
      max-width: 60%;
      text-align: right;
    }

    #progress { height: 2px; background: #1a1a1a; flex-shrink: 0; }
    #progress-bar { height: 100%; background: #c8f04a; width: 0%; transition: width 0.3s; }

    #viewer {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
      min-height: 0;
    }

    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { display: none; }

    /* Lista de titulares detectados */
    #lista {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      max-height: 55%;
      overflow-y: auto;
      background: rgba(0,0,0,0.93);
      border-top: 1px solid #c8f04a;
      display: none;
    }

    #lista.visible { display: block; }

    #lista-header {
      padding: 10px 14px 8px;
      font-size: 10px;
      color: #c8f04a;
      letter-spacing: 0.1em;
      border-bottom: 1px solid #1e1e1e;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.97);
    }

    .titular-item {
      padding: 10px 14px;
      border-bottom: 1px solid #1a1a1a;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .titular-item:active { background: #111; }

    .titular-texto {
      font-size: 13px;
      color: #ddd;
      line-height: 1.4;
      flex: 1;
    }

    .titular-badge {
      font-size: 10px;
      color: #c8f04a;
      background: rgba(200,240,74,0.1);
      border: 1px solid rgba(200,240,74,0.3);
      border-radius: 10px;
      padding: 2px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    footer {
      padding: 12px 16px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    #btn-scan { background: #c8f04a; color: #0a0a0a; }
    #btn-scan:disabled { background: #3a4a10; color: #6a8a20; }
    #btn-clear { background: #1a1a1a; color: #555; border: 1px solid #222; flex: 0 0 80px; }

    /* Panel de comentarios */
    #panel {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: flex-end;
    }

    #panel.visible { display: flex; }

    #panel-inner {
      width: 100%;
      max-height: 80vh;
      background: #111;
      border-top: 1px solid #222;
      border-radius: 12px 12px 0 0;
      display: flex;
      flex-direction: column;
      animation: slideUp 0.22s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    #panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-shrink: 0;
    }

    #panel-titular {
      font-size: 13px;
      color: #c8f04a;
      font-weight: bold;
      line-height: 1.4;
      flex: 1;
    }

    #panel-close {
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      flex: 0 0 auto;
      padding: 0;
    }

    #panel-comentarios {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }

    .comentario-item {
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .comentario-autor {
      font-size: 10px;
      color: #4af0c8;
      letter-spacing: 0.06em;
      margin-bottom: 3px;
    }

    .comentario-texto {
      font-size: 13px;
      color: #ccc;
      line-height: 1.5;
      font-family: sans-serif;
    }

    .sin-comentarios {
      padding: 20px 16px;
      font-size: 13px;
      color: #444;
      text-align: center;
    }

    #panel-form {
      padding: 12px 16px 24px;
      border-top: 1px solid #222;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }

    #panel-form input,
    #panel-form textarea {
      background: #0a0a0a;
      border: 1px solid #2a2a2a;
      border-radius: 3px;
      padding: 10px 12px;
      color: #f0f0f0;
      font-family: sans-serif;
      font-size: 13px;
      outline: none;
    }

    #panel-form input:focus,
    #panel-form textarea:focus { border-color: #c8f04a; }
    #panel-form textarea { min-height: 68px; resize: none; }

    #btn-enviar {
      align-self: flex-end;
      padding: 10px 24px;
      background: #c8f04a;
      color: #0a0a0a;
      border: none;
      border-radius: 3px;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
      flex: 0 0 auto;
    }

    #btn-enviar:disabled { background: #3a4a10; color: #6a8a20; }
  </style>
</head>
<body>

<header>
  <span>OCR · TITULARES</span>
  <span id="status">iniciando cámara...</span>
</header>

<div id="progress"><div id="progress-bar"></div></div>

<div id="viewer">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="lista">
    <div id="lista-header">TITULARES DETECTADOS — tocá para comentar</div>
    <div id="lista-items"></div>
  </div>
</div>

<footer>
  <button id="btn-scan" disabled>ESCANEAR</button>
  <button id="btn-clear">✕</button>
</footer>

<!-- Panel comentarios -->
<div id="panel">
  <div id="panel-inner">
    <div id="panel-header">
      <div id="panel-titular"></div>
      <button id="panel-close">✕</button>
    </div>
    <div id="panel-comentarios"></div>
    <div id="panel-form">
      <input id="input-autor" type="text" placeholder="Tu nombre (opcional)">
      <textarea id="input-comentario" placeholder="Escribí tu comentario..."></textarea>
      <button id="btn-enviar">ENVIAR</button>
    </div>
  </div>
</div>

<script>
  // ── CONFIG ──
  const SUPABASE_URL  = 'https://lgwyjuiurxjdcwkluykw.supabase.co'
  const ANON_KEY      = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxnd3lqdWl1cnhqZGN3a2x1eWt3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzY3NjUsImV4cCI6MjA5MDY1Mjc2NX0.VFa1QhGWyp2HCgY0MttgQRlRUc6cY-51VitrVmpVoIo'

  // Altura mínima en píxeles para considerar texto como "titular"
  // Tesseract devuelve bbox por palabra — filtramos las grandes
  const ALTURA_MINIMA = 30

  // ── DOM ──
  const video       = document.getElementById('video')
  const canvas      = document.getElementById('canvas')
  const btnScan     = document.getElementById('btn-scan')
  const btnClear    = document.getElementById('btn-clear')
  const status      = document.getElementById('status')
  const progressBar = document.getElementById('progress-bar')
  const lista       = document.getElementById('lista')
  const listaItems  = document.getElementById('lista-items')
  const panel       = document.getElementById('panel')
  const panelTitular= document.getElementById('panel-titular')
  const panelComents= document.getElementById('panel-comentarios')
  const panelClose  = document.getElementById('panel-close')
  const inputAutor  = document.getElementById('input-autor')
  const inputComent = document.getElementById('input-comentario')
  const btnEnviar   = document.getElementById('btn-enviar')

  let titularActivo = null

  // ── Cámara ──
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 } },
    audio: false
  }).then(stream => {
    video.srcObject = stream
    btnScan.disabled = false
    status.textContent = 'listo'
  }).catch(() => {
    status.textContent = 'sin acceso a cámara'
  })

  // ── Captura ──
  function capturar() {
    canvas.width  = video.videoWidth
    canvas.height = video.videoHeight
    canvas.getContext('2d').drawImage(video, 0, 0)
    return canvas
  }

  // ── Hash ──
  function normalizar(texto) {
    return texto.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9 ]/g, '')
      .trim()
  }

  async function hashTexto(texto) {
    const data = new TextEncoder().encode(normalizar(texto))
    const buf  = await crypto.subtle.digest('SHA-256', data)
    return Array.from(new Uint8Array(buf))
      .map(b => b.toString(16).padStart(2,'0'))
      .join('').slice(0, 16)
  }

  // ── Supabase ──
  const headers = {
    'Content-Type':  'application/json',
    'apikey':        ANON_KEY,
    'Authorization': `Bearer ${ANON_KEY}`
  }

  async function buscarComentarios(hashes) {
    if (!hashes.length) return []
    const params = hashes.map(h => `titular_hash=eq.${h}`).join(',')
    const url = `${SUPABASE_URL}/rest/v1/comentarios?or=(${params})&order=created_at.asc`
    const res = await fetch(url, { headers })
    return res.ok ? res.json() : []
  }

  async function guardarComentario(hash, texto, comentario, autor) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/comentarios`, {
      method: 'POST',
      headers: { ...headers, 'Prefer': 'return=minimal' },
      body: JSON.stringify({
        titular_hash:  hash,
        titular_texto: texto,
        comentario,
        autor: autor || 'anon'
      })
    })
    return res.ok
  }

  // ── Escanear ──
  btnScan.addEventListener('click', async () => {
    btnScan.disabled = true
    btnScan.textContent = 'PROCESANDO...'
    lista.classList.remove('visible')
    progressBar.style.width = '0%'

    const img = capturar()

    try {
      const result = await Tesseract.recognize(img, 'spa', {
        logger: m => {
          if (m.status === 'recognizing text') {
            progressBar.style.width = Math.round(m.progress * 100) + '%'
            status.textContent = `reconociendo... ${Math.round(m.progress * 100)}%`
          } else {
            status.textContent = m.status
          }
        }
      })

      // Filtrar solo palabras/líneas grandes (titulares)
      const palabras = result.data.words || []
      const grandes  = palabras.filter(w => {
        const h = w.bbox.y1 - w.bbox.y0
        return h >= ALTURA_MINIMA && w.text.trim().length > 2
      })

      // Agrupar palabras cercanas en líneas
      const titulares = agruparEnLineas(grandes)

      if (titulares.length === 0) {
        status.textContent = 'sin titulares detectados'
        listaItems.innerHTML = '<div style="padding:16px;color:#444;font-size:13px">No se detectaron titulares grandes. Acercate más al diario.</div>'
      } else {
        status.textContent = `${titulares.length} titular${titulares.length > 1 ? 'es' : ''}`

        // Buscar comentarios en Supabase
        const hashes = await Promise.all(titulares.map(t => hashTexto(t)))
        const comentarios = await buscarComentarios(hashes)

        listaItems.innerHTML = ''
        titulares.forEach((texto, i) => {
          const hash  = hashes[i]
          const count = comentarios.filter(c => c.titular_hash === hash).length
          const div   = document.createElement('div')
          div.className = 'titular-item'
          div.innerHTML = `
            <div class="titular-texto">${texto}</div>
            <div class="titular-badge">💬 ${count}</div>
          `
          div.addEventListener('click', () => abrirPanel(texto, hash, comentarios))
          listaItems.appendChild(div)
        })
      }

      lista.classList.add('visible')
      progressBar.style.width = '100%'

    } catch (err) {
      status.textContent = 'error'
      console.error(err)
    } finally {
      btnScan.disabled = false
      btnScan.textContent = 'ESCANEAR'
      setTimeout(() => progressBar.style.width = '0%', 1000)
    }
  })

  // Agrupar palabras en líneas por proximidad vertical
  function agruparEnLineas(palabras) {
    if (!palabras.length) return []
    const ordenadas = [...palabras].sort((a, b) => a.bbox.y0 - b.bbox.y0)
    const lineas = []
    let lineaActual = [ordenadas[0]]

    for (let i = 1; i < ordenadas.length; i++) {
      const prev = lineaActual[lineaActual.length - 1]
      const curr = ordenadas[i]
      // Si el centro vertical está cerca, es la misma línea
      const centroP = (prev.bbox.y0 + prev.bbox.y1) / 2
      const centroC = (curr.bbox.y0 + curr.bbox.y1) / 2
      if (Math.abs(centroC - centroP) < 20) {
        lineaActual.push(curr)
      } else {
        lineas.push(lineaActual.map(w => w.text).join(' '))
        lineaActual = [curr]
      }
    }
    lineas.push(lineaActual.map(w => w.text).join(' '))

    return lineas.filter(l => l.trim().length > 3)
  }

  // ── Panel ──
  async function abrirPanel(texto, hash, todosComentarios) {
    titularActivo = { texto, hash }
    panelTitular.textContent = texto

    const mios = (todosComentarios || []).filter(c => c.titular_hash === hash)
    renderComentarios(mios)

    inputAutor.value  = ''
    inputComent.value = ''
    panel.classList.add('visible')
  }

  function renderComentarios(lista) {
    if (!lista.length) {
      panelComents.innerHTML = '<div class="sin-comentarios">Sin comentarios aún. ¡Sé el primero!</div>'
      return
    }
    panelComents.innerHTML = lista.map(c => `
      <div class="comentario-item">
        <div class="comentario-autor">${c.autor || 'anon'}</div>
        <div class="comentario-texto">${c.comentario}</div>
      </div>
    `).join('')
  }

  function cerrarPanel() {
    panel.classList.remove('visible')
    titularActivo = null
  }

  // ── Enviar comentario ──
  btnEnviar.addEventListener('click', async () => {
    if (!titularActivo) return
    const comentario = inputComent.value.trim()
    if (!comentario) return

    btnEnviar.disabled    = true
    btnEnviar.textContent = '...'

    const ok = await guardarComentario(
      titularActivo.hash,
      titularActivo.texto,
      comentario,
      inputAutor.value.trim()
    )

    if (ok) {
      // Recargar comentarios del panel
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/comentarios?titular_hash=eq.${titularActivo.hash}&order=created_at.asc`,
        { headers }
      )
      const nuevos = await res.json()
      renderComentarios(nuevos)
      inputComent.value = ''
    } else {
      alert('No se pudo enviar. Intentá de nuevo.')
    }

    btnEnviar.disabled    = false
    btnEnviar.textContent = 'ENVIAR'
  })

  panelClose.addEventListener('click', cerrarPanel)
  panel.addEventListener('click', e => { if (e.target === panel) cerrarPanel() })

  btnClear.addEventListener('click', () => {
    lista.classList.remove('visible')
    status.textContent = 'listo'
  })
</script>

</body>
</html>
