<script>

const headers = {

  'apikey': ANON_KEY,
  'Authorization': `Bearer ${ANON_KEY}`
}

// 🔧 NORMALIZACIÓN CORREGIDA
function normalizar(texto) {
  return texto.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[^a-z0-9 ]/g, '')
    .replace(/\s+/g, ' ')
    .trim()
}

async function hashTexto(texto) {
  const data = new TextEncoder().encode(normalizar(texto))
  const buf  = await crypto.subtle.digest('SHA-256', data)
  return Array.from(new Uint8Array(buf))
    .map(b => b.toString(16).padStart(2,'0'))
    .join('').slice(0, 16)
}

// 🔧 QUERY CORREGIDA
async function buscarComentarios(hashes) {
  if (!hashes.length) return []

  const lista = hashes.map(h => `"${h}"`).join(',')
  const url = `${SUPABASE_URL}/rest/v1/comentarios?titular_hash=in.(${lista})&order=created_at.asc`

  const res = await fetch(url, { headers })
  return res.ok ? res.json() : []
}

// TEST SIMPLE
async function test() {
  const textos = [

    "Otro titular importante"
  ]

  const hashes = await Promise.all(textos.map(t => hashTexto(t)))
  console.log("HASHES:", hashes)

  const comentarios = await buscarComentarios(hashes)
  console.log("COMENTARIOS:", comentarios)
}

test()
