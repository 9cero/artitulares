<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OCR Titulares</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #c8f04a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #status {
      font-size: 11px;
      color: #555;
      max-width: 60%;
      text-align: right;
    }

    #viewer {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas { display: none; }

    #resultado {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      max-height: 50%;
      overflow-y: auto;
      background: rgba(0,0,0,0.92);
      padding: 12px 16px;
      border-top: 1px solid #c8f04a;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }

    #resultado.visible { display: block; }

    #resultado h3 {
      font-size: 10px;
      color: #c8f04a;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    #texto-detectado {
      color: #ddd;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.7;
    }

    footer {
      padding: 12px 16px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    #btn-scan {
      background: #c8f04a;
      color: #0a0a0a;
    }

    #btn-scan:disabled {
      background: #3a4a10;
      color: #6a8a20;
    }

    #btn-clear {
      background: #1a1a1a;
      color: #555;
      border: 1px solid #222;
      flex: 0 0 80px;
    }

    #progress {
      height: 2px;
      background: #1a1a1a;
      position: relative;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: #c8f04a;
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>

<header>
  <span>OCR · TITULARES</span>
  <span id="status">iniciando cámara...</span>
</header>

<div id="progress"><div id="progress-bar"></div></div>

<div id="viewer">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="resultado">
    <h3>TEXTO DETECTADO</h3>
    <div id="texto-detectado"></div>
  </div>
</div>

<footer>
  <button id="btn-scan" disabled>ESCANEAR</button>
  <button id="btn-clear">✕</button>
</footer>

<script>
  const video    = document.getElementById('video')
  const canvas   = document.getElementById('canvas')
  const btnScan  = document.getElementById('btn-scan')
  const btnClear = document.getElementById('btn-clear')
  const status   = document.getElementById('status')
  const resultado= document.getElementById('resultado')
  const textoDiv = document.getElementById('texto-detectado')
  const progressBar = document.getElementById('progress-bar')

  // Iniciar cámara
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment', width: { ideal: 1280 } },
    audio: false
  })
  .then(stream => {
    video.srcObject = stream
    btnScan.disabled = false
    status.textContent = 'listo'
  })
  .catch(() => {
    status.textContent = 'sin acceso a cámara'
  })

  // Capturar frame
  function capturar() {
    canvas.width  = video.videoWidth
    canvas.height = video.videoHeight
    canvas.getContext('2d').drawImage(video, 0, 0)
    return canvas
  }

  // Escanear con Tesseract
  btnScan.addEventListener('click', async () => {
    btnScan.disabled = true
    btnScan.textContent = 'PROCESANDO...'
    resultado.classList.remove('visible')
    progressBar.style.width = '0%'

    const imageCanvas = capturar()

    try {
      const result = await Tesseract.recognize(imageCanvas, 'spa', {
        logger: m => {
          if (m.status === 'recognizing text') {
            const pct = Math.round(m.progress * 100)
            progressBar.style.width = pct + '%'
            status.textContent = `reconociendo... ${pct}%`
          } else {
            status.textContent = m.status
          }
        }
      })

      const texto = result.data.text.trim()

      if (!texto) {
        status.textContent = 'sin texto detectado'
        textoDiv.textContent = 'No se detectó texto. Acercate más y asegurate de tener buena luz.'
      } else {
        status.textContent = 'listo'
        textoDiv.textContent = texto
      }

      resultado.classList.add('visible')
      progressBar.style.width = '100%'

    } catch (err) {
      status.textContent = 'error: ' + err.message
      console.error(err)
    } finally {
      btnScan.disabled = false
      btnScan.textContent = 'ESCANEAR'
      setTimeout(() => progressBar.style.width = '0%', 1000)
    }
  })

  btnClear.addEventListener('click', () => {
    resultado.classList.remove('visible')
    status.textContent = 'listo'
    progressBar.style.width = '0%'
  })
</script>

</body>
</html>
