<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OCR Titulares</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: monospace;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 16px;
      background: #111;
      border-bottom: 1px solid #222;
      font-size: 12px;
      letter-spacing: 0.1em;
      color: #c8f04a;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #status {
      font-size: 11px;
      color: #555;
    }

    #viewer {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    canvas { display: none; }

    #resultado {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      max-height: 45%;
      overflow-y: auto;
      background: rgba(0,0,0,0.88);
      padding: 12px 16px;
      border-top: 1px solid #c8f04a;
      font-size: 13px;
      line-height: 1.6;
      display: none;
    }

    #resultado.visible { display: block; }

    #resultado h3 {
      font-size: 10px;
      color: #c8f04a;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .bloque {
      padding: 6px 0;
      border-bottom: 1px solid #1e1e1e;
      color: #ddd;
    }

    .bloque:last-child { border-bottom: none; }

    .bloque-altura {
      font-size: 9px;
      color: #444;
      margin-top: 2px;
    }

    footer {
      padding: 12px 16px;
      background: #111;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }

    button {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.1em;
      cursor: pointer;
    }

    #btn-scan {
      background: #c8f04a;
      color: #0a0a0a;
    }

    #btn-scan:disabled {
      background: #3a4a10;
      color: #6a8a20;
    }

    #btn-clear {
      background: #1a1a1a;
      color: #555;
      border: 1px solid #222;
      flex: 0 0 80px;
    }
  </style>
</head>
<body>

<header>
  <span>OCR · TITULARES</span>
  <span id="status">iniciando cámara...</span>
</header>

<div id="viewer">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <div id="resultado">
    <h3>TEXTO DETECTADO</h3>
    <div id="bloques"></div>
  </div>
</div>

<footer>
  <button id="btn-scan" disabled>ESCANEAR</button>
  <button id="btn-clear">✕</button>
</footer>

<script>
  // ── CONFIG — reemplazá con tus datos ──
  const EDGE_URL = 'https://lgwyjuiurxjdcwkluykw.supabase.co/functions/v1/smart-handler'
  const ANON_KEY = 'sb_publishable_v_4K3542fAaml4qnA6OQTw_KpD8ShSG'

  const video    = document.getElementById('video')
  const canvas   = document.getElementById('canvas')
  const btnScan  = document.getElementById('btn-scan')
  const btnClear = document.getElementById('btn-clear')
  const status   = document.getElementById('status')
  const resultado= document.getElementById('resultado')
  const bloques  = document.getElementById('bloques')

  // Iniciar cámara
  navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'environment' },
    audio: false
  })
  .then(stream => {
    video.srcObject = stream
    btnScan.disabled = false
    status.textContent = 'listo'
  })
  .catch(() => {
    status.textContent = 'sin acceso a cámara'
  })

  // Capturar frame como base64
  function capturar() {
    canvas.width  = video.videoWidth
    canvas.height = video.videoHeight
    canvas.getContext('2d').drawImage(video, 0, 0)
    return canvas.toDataURL('image/jpeg', 0.8).split(',')[1]
  }

  // Escanear
  btnScan.addEventListener('click', async () => {
    btnScan.disabled = true
    btnScan.textContent = 'ESCANEANDO...'
    status.textContent = 'procesando...'
    resultado.classList.remove('visible')

    try {
      const image = capturar()

      const res = await fetch(EDGE_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${ANON_KEY}`
        },
        body: JSON.stringify({ image })
      })

      const data = await res.json()

      if (data.error) throw new Error(data.error)

      const titulares = data.titulares || []

      if (titulares.length === 0) {
        status.textContent = 'sin texto detectado'
        bloques.innerHTML = '<div class="bloque">No se detectó texto. Acercate más al titular.</div>'
      } else {
        status.textContent = `${titulares.length} bloque${titulares.length > 1 ? 's' : ''} detectado${titulares.length > 1 ? 's' : ''}`
        bloques.innerHTML = titulares.map(t => `
          <div class="bloque">
            ${t.texto}
            <div class="bloque-altura">altura bbox: ${alturaBox(t.boundingBox)}px</div>
          </div>
        `).join('')
      }

      resultado.classList.add('visible')

    } catch (err) {
      status.textContent = 'error: ' + err.message
      console.error(err)
    } finally {
      btnScan.disabled = false
      btnScan.textContent = 'ESCANEAR'
    }
  })

  // Limpiar
  btnClear.addEventListener('click', () => {
    resultado.classList.remove('visible')
    status.textContent = 'listo'
  })

  // Calcular altura del bounding box (para debug)
  function alturaBox(verts) {
    if (!verts || verts.length < 4) return '?'
    return Math.abs((verts[2].y || 0) - (verts[0].y || 0))
  }
</script>

</body>
</html>
